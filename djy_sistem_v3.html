<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJY — Commercial Offer Module</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F4F6F8;--surface:#FFFFFF;--surface2:#EDF0F4;--surface3:#E2E6EC;
  --border:#D4D9E0;--border2:#B8BFC9;
  --navy:#0D1B2A;--navy2:#152238;
  --teal:#2EC4B6;--teal-dim:rgba(46,196,182,0.12);--teal-dark:#1A9E92;
  --orange:#F0A030;--orange-dim:rgba(240,160,48,0.12);
  --blue:#4A90D9;--blue-dim:rgba(74,144,217,0.12);
  --text:#0D1B2A;--text2:#4A5568;--text3:#8896A6;
  --green:#0D9373;--green-bg:#D6F5EC;
  --red:#C53030;--red-bg:#FEE2E2;
  --font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.hdr{background:var(--navy);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr h1{font-size:18px;font-weight:800;letter-spacing:2px}
.hdr h1 span{color:var(--teal);font-weight:400;font-size:12px;margin-left:8px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-badge{font-family:var(--mono);font-size:10px;background:rgba(46,196,182,0.2);color:var(--teal);padding:4px 12px;border-radius:12px}
.hdr-link{font-size:11px;color:rgba(255,255,255,0.4);text-decoration:none}
.hdr-link:hover{color:var(--teal)}
.wrap{max-width:1100px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:12px;border-bottom:2px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.tab{font-family:var(--mono);padding:7px 14px;font-size:10px;font-weight:600;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:.15s;white-space:nowrap}
.tab:hover{border-color:var(--teal);color:var(--teal)}
.tab.on{background:var(--teal-dim);border-color:var(--teal);color:var(--teal-dark)}
.prog{display:flex;gap:2px;margin-bottom:14px}
.prog div{flex:1;height:3px;border-radius:2px;background:var(--surface3)}
.prog .done{background:var(--teal)}.prog .now{background:var(--orange)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:700;color:var(--teal-dark);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-num{width:24px;height:24px;border-radius:50%;background:var(--teal);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.fd{margin-bottom:10px}
.fd label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;letter-spacing:.3px}
.fi{width:100%;font-family:var(--font);font-size:13px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none;transition:.15s}
.fi:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-dim)}
.fi[readonly]{background:var(--surface2);color:var(--text2)}
select.fi{cursor:pointer}
textarea.fi{resize:vertical;min-height:70px}
.rg{display:flex;gap:4px;flex-wrap:wrap}
.rb{padding:6px 14px;border-radius:6px;border:1px solid var(--border);font-size:11px;font-weight:500;cursor:pointer;color:var(--text3);transition:.15s}
.rb.on{border-color:var(--teal);background:var(--teal-dim);color:var(--teal-dark);font-weight:700}
.rb.org.on{border-color:var(--orange);background:var(--orange-dim);color:#B07818}
.cr{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:3px;cursor:pointer;font-size:11px;color:var(--text3);transition:.15s}
.cr:hover{background:rgba(46,196,182,0.03)}
.cr.on{background:var(--teal-dim);border-color:var(--teal);color:var(--teal-dark)}
.ck{width:14px;height:14px;border-radius:3px;border:2px solid var(--text3);display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;flex-shrink:0}
.cr.on .ck{border-color:var(--teal);background:var(--teal)}
.sd{width:20px;height:20px;border-radius:4px;margin:0 auto;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;transition:.15s}
.sd.s{border:2px solid var(--teal-dim)}.sd.s.on{background:var(--teal);border-color:var(--teal)}
.sd.c{border:2px solid var(--orange-dim)}.sd.c.on{background:var(--orange);border-color:var(--orange)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:9px 12px;text-align:left;border-bottom:2px solid var(--border);background:var(--surface2)}
.tbl td{padding:8px 12px;border-bottom:1px solid rgba(212,217,224,0.5);font-size:13px;vertical-align:middle}
.tbl input,.tbl select{font-family:var(--mono);font-size:11px;padding:5px 7px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);outline:none}
.tbl input:focus,.tbl select:focus{border-color:var(--teal)}
.tbl tfoot td{font-weight:700;border-top:2px solid var(--border);background:var(--surface2)}
.sc{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:12px}
.pb{display:flex;border-radius:8px;overflow:hidden;height:28px;margin-top:8px}
.pb div{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;transition:width .3s}
.gw{background:var(--surface2);border-radius:8px;padding:12px;border:1px solid var(--border);margin-top:8px}
.gr{display:flex;align-items:center;margin-bottom:5px}
.gl{width:100px;font-size:10px;color:var(--text3);font-weight:600}
.gt{flex:1;position:relative;height:22px;background:var(--surface3);border-radius:4px}
.gb{position:absolute;height:22px;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:9px;font-weight:700;color:#fff}
.btn{font-family:var(--font);font-size:12px;font-weight:600;padding:9px 18px;border-radius:8px;cursor:pointer;transition:.15s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-1px)}
.btn-p{background:var(--teal);color:var(--navy)}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-o{background:var(--orange);color:#fff}
.btn-ok{background:var(--green-bg);border:1px solid var(--green);color:var(--green)}
.btn-sm{font-size:10px;padding:5px 12px}
.btn-del{background:transparent;border:1px solid var(--border);color:var(--text3);width:26px;height:26px;border-radius:6px;padding:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.btn-del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.ftr{margin-top:16px;padding:16px;background:var(--navy);border-radius:12px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.ftr .l{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:2px}
.ftr .v{font-size:15px;font-weight:800}
.badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 9px;border-radius:12px}
.badge-t{background:var(--teal-dim);color:var(--teal-dark)}
.badge-o{background:var(--orange-dim);color:#B07818}
.badge-g{background:var(--green-bg);color:var(--green)}
.toast-c{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:6px}
.toast{font-size:13px;font-weight:500;padding:10px 18px;border-radius:8px;background:var(--navy);color:#fff;box-shadow:0 8px 24px rgba(0,0,0,0.15);animation:tIn .25s;display:flex;align-items:center;gap:8px}
.toast.ok{border-left:3px solid var(--teal)}.toast.err{border-left:3px solid var(--red)}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.warn-box{padding:10px 14px;background:var(--orange-dim);border:1px solid var(--orange);border-radius:8px;font-size:11px;color:#B07818;margin-top:8px}

/* ═══ CAFE GARSON CARD SYSTEM ═══ */
.cg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px;margin:14px 0}
.cg-card{position:relative;background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;text-align:center}
.cg-card:hover{border-color:var(--teal);background:rgba(46,196,182,0.04);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.06)}
.cg-card.on{border-color:var(--teal);background:var(--teal-dim);box-shadow:0 0 0 3px rgba(46,196,182,0.15)}
.cg-card .cg-icon{font-size:26px;margin-bottom:6px}
.cg-card .cg-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.cg-card .cg-sub{font-size:10px;color:var(--text3);margin-bottom:10px}
.cg-card .cg-prices{display:flex;justify-content:center;gap:12px;padding-top:10px;border-top:1px solid var(--border)}
.cg-card.on .cg-prices{border-top-color:var(--teal)}
.cg-p{font-family:var(--mono);font-size:12px;font-weight:600}
.cg-p.tl{color:var(--orange)}.cg-p.eu{color:var(--blue)}
.cg-p small{font-size:9px;font-weight:400;color:var(--text3)}
.cg-check{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:transparent;transition:.15s}
.cg-card.on .cg-check{border-color:var(--teal);background:var(--teal);color:#fff}
.cg-warn{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--red-bg);border:1px solid rgba(197,48,48,0.2);border-radius:8px;font-size:11px;color:var(--red);font-weight:500;margin-bottom:12px}
.cg-summary{margin-top:14px;padding:14px 18px;background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:10px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.cg-summary .cg-stotal{font-size:20px;font-weight:800;color:var(--teal)}
.cg-summary .cg-slabel{font-size:10px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px}
@media(max-width:768px){.fg,.fg3,.fg4{grid-template-columns:1fr}.ftr{flex-direction:column;text-align:center}.cg-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="hdr">
  <h1>DJY<span>Commercial Offer</span></h1>
  <div class="hdr-right">
    <span class="hdr-badge" id="hOfferNo"></span>
    <a class="hdr-link" href="javascript:void(0)" onclick="window.close()">← v3'e Dön</a>
  </div>
</div>
<div class="wrap">
  <div class="prog" id="prog"></div>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
  <div style="display:flex;justify-content:space-between;margin-top:14px" id="nav"></div>
  <div class="ftr" id="ftr"></div>
</div>
<div class="toast-c" id="tC"></div>

<script>
// ═══ STORAGE ═══
function ld(k){try{return JSON.parse(localStorage.getItem(k))||null}catch(e){return null}}
function sv(k,d){localStorage.setItem(k,JSON.stringify(d))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6)}
function fN(n){return n?n.toLocaleString('tr-TR'):'0'}
function toast(m,t='ok'){const c=document.getElementById('tC'),e=document.createElement('div');e.className='toast '+t;e.innerHTML=(t==='ok'?'✓':'✕')+' '+m;c.appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),200)},2500)}

const musteriler=ld('djy_musteri')||[];
if(musteriler.length===0){
  document.querySelector('.wrap').innerHTML='<div style="text-align:center;padding:60px 20px"><h2 style="color:var(--red);margin-bottom:10px">v3 Verisi Bulunamadı</h2><p style="color:var(--text3)">Önce <strong>djy_sistem_v3.html</strong> dosyasını açın ve en az bir müşteri ekleyin.</p></div>';
}

// ═══ TABS ═══
const TABS=[
  {id:'cust',l:'① Müşteri'},{id:'proj',l:'② Proje'},{id:'scope',l:'③ Scope'},
  {id:'mat',l:'④ Hammadde'},{id:'mfg',l:'⑤ İmalat'},{id:'corr',l:'⑥ Korozyon'},
  {id:'bolt',l:'⑦ Cıvata'},{id:'note',l:'⑧ Notlar'},{id:'del',l:'⑨ Teslimat'},
  {id:'fin',l:'⑩ Maliyet & Fiyat'},{id:'pay',l:'⑪ Ödeme'},{id:'time',l:'⑫ Timeline'},{id:'term',l:'⑬ Şartlar'}
];

const SCOPE=[
  'Statical Design','Shop Drawings','Raw Material Supply','Screw and Nuts',
  'Anchor Bolts','Shot Blast','Manufacturing','Pre-Assembly',
  '3rd Party Tests','Paint Works','Galvanize','Site Transportation',
  'Assembly Team/Equipment','Anchor Bolt Assembly','Concrete Works'
];
const INC=['Raw material supply','Manufacturing & fabrication','Shot blasting SA 2.5','QC & testing','Marking & identification','Loading to trucks'];
const EXC=['Site transportation','Erection works','Concrete works','Anchor bolt install','Fire protection','Insurance','Customs & duties','Site crane & equip.'];
const DLT=['EXW Factory','FOB Port','CFR Destination','CIF Destination','DAP Site','DDP Site'];

// ═══ CARD DEFINITIONS ═══
const MAT_CARDS=[
  {id:'hadde-s235',name:'Hadde S235',icon:'🏗️',sub:'S235JR — Siyah',v3key:'Hadde-S235-Siyah',section:'hammadde'},
  {id:'hadde-s275',name:'Hadde S275',icon:'🏗️',sub:'S275JR — Siyah',v3key:'Hadde-S275-Siyah',section:'hammadde'},
  {id:'hadde-s355',name:'Hadde S355',icon:'🏗️',sub:'S355JR — Siyah',v3key:'Hadde-S355-Siyah',section:'hammadde'},
  {id:'kutu-profil',name:'Kutu Profil',icon:'📦',sub:'Box Section',v3key:'Kutu Profil-S235-Siyah',section:'hammadde'},
  {id:'sac',name:'Sac',icon:'📄',sub:'Plate / Sheet',v3key:'Sac-S235-Siyah',section:'hammadde'},
  {id:'boru',name:'Boru',icon:'🔩',sub:'Pipe / Tube',v3key:'Boru-S235-Siyah',section:'hammadde'},
  {id:'insaat-demiri',name:'İnşaat Demiri',icon:'⚒️',sub:'Rebar',v3key:'İnşaat Demiri-S235-Siyah',section:'hammadde'},
  {id:'c-profil',name:'C Profil',icon:'🔲',sub:'Channel',v3key:'C Profil-S235-Siyah',section:'hammadde'},
  {id:'z-profil',name:'Z Profil',icon:'⚡',sub:'Z Purlin',v3key:'Z Profil-S235-Siyah',section:'hammadde'},
  {id:'kosebent',name:'Köşebent',icon:'📐',sub:'Angle',v3key:'Köşebent-S235-Siyah',section:'hammadde'},
];
const MFG_CARDS=[
  {id:'ay1',name:'Ana Yapı 1',icon:'1️⃣',sub:'Ağır yapı',v3key:'Ana Yapı 1-Kg-İmalat',section:'uretim'},
  {id:'ay2',name:'Ana Yapı 2',icon:'2️⃣',sub:'Orta-ağır',v3key:'Ana Yapı 2-Kg-İmalat',section:'uretim'},
  {id:'ay3',name:'Ana Yapı 3',icon:'3️⃣',sub:'Orta yapı',v3key:'Ana Yapı 3-Kg-İmalat',section:'uretim'},
  {id:'ay4',name:'Ana Yapı 4',icon:'4️⃣',sub:'Orta-hafif',v3key:'Ana Yapı 4-Kg-İmalat',section:'uretim'},
  {id:'ay5',name:'Ana Yapı 5',icon:'5️⃣',sub:'Hafif yapı',v3key:'Ana Yapı 5-Kg-İmalat',section:'uretim'},
  {id:'ay6',name:'Ana Yapı 6',icon:'6️⃣',sub:'Detaylı',v3key:'Ana Yapı 6-Kg-İmalat',section:'uretim'},
  {id:'ay7',name:'Ana Yapı 7',icon:'7️⃣',sub:'Çok detaylı',v3key:'Ana Yapı 7-Kg-İmalat',section:'uretim'},
  {id:'ay8',name:'Ana Yapı 8',icon:'8️⃣',sub:'Karmaşık',v3key:'Ana Yapı 8-Kg-İmalat',section:'uretim'},
  {id:'ay9',name:'Ana Yapı 9',icon:'9️⃣',sub:'Çok karmaşık',v3key:'Ana Yapı 9-Kg-İmalat',section:'uretim'},
  {id:'ay10',name:'Ana Yapı 10',icon:'🔟',sub:'Özel imalat',v3key:'Ana Yapı 10-Kg-İmalat',section:'uretim'},
  {id:'kor',name:'Korkuluk',icon:'🛡️',sub:'Handrails',v3key:'Korkuluk-Kg-İmalat',section:'uretim'},
  {id:'mer',name:'Merdiven',icon:'🪜',sub:'Stairs',v3key:'Merdiven-Kg-İmalat',section:'uretim'},
];
const CORR_CARDS=[
  {id:'c3m',name:'C3M',icon:'🎨',sub:'Orta korozif — İç mekan',v3key:'Ana Yapı-C3M',section:'satinalma'},
  {id:'c4m',name:'C4M',icon:'🌊',sub:'Yüksek korozif — Sahil',v3key:'Ana Yapı-C4M',section:'satinalma'},
  {id:'c5h',name:'C5H',icon:'🏭',sub:'Çok yüksek — Endüstriyel',v3key:'Ana Yapı-C5H',section:'satinalma'},
  {id:'galv',name:'Galvaniz',icon:'⚙️',sub:'Sıcak daldırma galvaniz',v3key:'Ana Yapı-Galvaniz',section:'satinalma'},
  {id:'zinc',name:'Zinc Astarlı',icon:'🔒',sub:'Zinc primer coating',v3key:'Ana Yapı-Zinc Astarlı',section:'satinalma'},
];
const BOLT_CARDS=[
  {id:'88b',name:'8.8 Black',icon:'⚫',sub:'Grade 8.8 — Siyah',tlKg:0.3},
  {id:'88g',name:'8.8 Galvanized',icon:'⚪',sub:'Grade 8.8 — Galvaniz',tlKg:0.5},
  {id:'109b',name:'10.9 Black',icon:'🔴',sub:'Grade 10.9 — Siyah',tlKg:0.6},
  {id:'109g',name:'10.9 Galvanized',icon:'🟡',sub:'Grade 10.9 — Galvaniz',tlKg:0.8},
];

let tab=0;
function autoNo(){const offers=ld('djy_co_offers')||[];const yr=String(new Date().getFullYear()).slice(-2);return 'R-'+String(offers.length+1).padStart(2,'0')+'-'+yr}

let O={
  cust:{co:'',cn:'',cp:'',em:'',ph:'',web:'',pb:'€'},
  proj:{no:autoNo(),dt:new Date().toISOString().split('T')[0],val:'30 Days',tw:0,cur:'EUR',by:'Mustafa Toprakçeken',pn:''},
  scope:Object.fromEntries(SCOPE.map(s=>[s,'C'])),
  matBasket: [], 
  mfgBasket: [], 
  corrBasket: [], 
  overhead: { fixed: 0, djy: 1 }, 
  boltCard:null,
  bolt:{gr:'',fi:''},
  notes:{inc:Object.fromEntries(INC.map(i=>[i,false])),exc:Object.fromEntries(EXC.map(e=>[e,false]))},
  poz:[{id:1,p:'POZ-001',type:'main_steel',d:'',q:0,u:'TON',up:0}],
  tax:0,margin:0,
  del:{t:'DAP Site',loc:'', tCap:22, tCost:0},
  pay:{adv:0,ld:0,fat:0,dv:0},
  gantt:[{l:'Contract',sw:0,dur:0},{l:'Material',sw:0,dur:0},{l:'Production',sw:0,dur:0},{l:'Loading',sw:0,dur:0}],
  tt:''
};

// ═══ PRICE HELPERS ═══
function getV3Price(sec,key){const bf=ld('djy_fiyat')||{};return (bf[sec]||{})[key]||0}
function tlToTarget(tl){const bf=ld('djy_fiyat')||{};if(O.proj.cur==='TRY')return tl;if(O.proj.cur==='USD')return tl/(bf.kurUsd||43);return tl/(bf.kurEur||50)}
const curSym=()=>O.proj.cur==='EUR'?'€':O.proj.cur==='USD'?'$':'₺';
const oNet=()=>O.poz.reduce((s,r)=>s+r.q*r.up,0);
const oTx=()=>oNet()*(O.tax/100);
const oTot=()=>oNet()+oTx();
function cardTL(c){if(c.tlKg!==undefined)return c.tlKg;return getV3Price(c.section,c.v3key)}

function getMatTon() { return O.matBasket ? O.matBasket.reduce((s,b)=>s+b.ton,0) : 0; }
function getMfgTon() { return O.mfgBasket ? O.mfgBasket.reduce((s,b)=>s+b.ton,0) : 0; }

// ═══ NAVIGATION CONTROLLER (GATEKEEPER) ═══
function changeTab(nextIdx) {
  if (nextIdx > tab) { 
    for (let i = tab; i < nextIdx; i++) {
       if (i === 0 && !O.cust.co) { 
           toast('Lütfen müşteri seçin!','err'); tab=0; render(); return; 
       }
       if (i === 1 && (!O.proj.pn || O.proj.tw <= 0)) { 
           toast('Proje adı ve 0\'dan büyük bir Tonaj girmelisiniz!','err'); tab=1; render(); return; 
       }
       if (i === 3 && O.scope['Raw Material Supply'] === 'S') {
          if (getMatTon() < O.proj.tw) {
             toast(`Hammadde eksik! En az Proje Tonajı (${O.proj.tw} Ton) kadar olmalı.`,'err');
             tab=3; render(); return;
          }
       }
       if (i === 4 && O.scope['Manufacturing'] === 'S') {
          if (getMfgTon() < O.proj.tw) {
             toast(`İmalat eksik! Kalan: ${O.proj.tw - getMfgTon()} Ton`,'err');
             tab=4; render(); return;
          }
       }
    }
  }
  tab = nextIdx;
  render();
}

// ═══ COST CALCULATION ═══
function calcCosts(){
  const w=O.proj.tw*1000;
  if(w<=0)return{items:[],total:0,perTon:0};
  const items=[];let total=0;
  const bf=ld('djy_fiyat')||{};
  const rate = O.proj.cur==='TRY'?1:(O.proj.cur==='USD'?(bf.kurUsd||43):(bf.kurEur||50));

  if(O.matBasket && O.matBasket.length > 0 && O.scope['Raw Material Supply']==='S'){
    let tTon = 0; let tParaTL = 0;
    O.matBasket.forEach(b => { tTon += b.ton; tParaTL += b.toplam; });
    const avgTlPerTon = tParaTL / tTon; 
    const curTotalCost = tlToTarget(avgTlPerTon * (w / 1000)); 
    const avgTlPerKg = avgTlPerTon / 1000; 
    items.push({
      name: 'Hammadde Reçetesi (Ort: ' + fN(Math.round(tlToTarget(avgTlPerTon))) + ' ' + curSym() + '/ton)',
      section: 'Hammadde', tlKg: avgTlPerKg, qty: w, tlTotal: avgTlPerKg * w, curTotal: curTotalCost
    });
    total += curTotalCost;
  }
  
  if(O.mfgBasket && O.mfgBasket.length > 0 && O.scope['Manufacturing']==='S'){
    let tTon = 0; let tParaTL = 0;
    O.mfgBasket.forEach(b => { tTon += b.ton; tParaTL += b.toplam; });
    const avgTlPerTon = tParaTL / tTon; 
    const curTotalCost = tlToTarget(avgTlPerTon * (w / 1000)); 
    const avgTlPerKg = avgTlPerTon / 1000; 
    items.push({
      name: 'Karma İmalat Reçetesi (Ort: ' + fN(Math.round(tlToTarget(avgTlPerTon))) + ' ' + curSym() + '/ton)',
      section: 'İmalat', tlKg: avgTlPerKg, qty: w, tlTotal: avgTlPerKg * w, curTotal: curTotalCost
    });
    total += curTotalCost;
  }

  if(O.overhead && O.overhead.fixed > 0) {
    const djyLevel = O.overhead.djy || 1;
    const capacity = 400 - ((djyLevel - 1) * 20); 
    const curTotalPerTon = tlToTarget(O.overhead.fixed / capacity); 
    const curTotal = curTotalPerTon * (w / 1000); 
    const tlTotalPerKg = (O.overhead.fixed / capacity) / 1000; 
    items.push({
      name: `Genel Gider (Zorluk: DJY ${djyLevel} | Kapasite: ${capacity} Ton)`,
      section: 'Genel Gider', tlKg: tlTotalPerKg, qty: w, tlTotal: tlTotalPerKg * w, curTotal: curTotal
    });
    total += curTotal;
  }

  if(O.corrBasket && O.corrBasket.length > 0 && (O.scope['Paint Works']==='S'||O.scope['Galvanize']==='S')){
    let tTon = 0; let tParaTL = 0;
    O.corrBasket.forEach(b => { tTon += b.ton; tParaTL += b.toplam; });
    const avgTlPerTon = tParaTL / tTon; 
    const curTotalCost = tlToTarget(avgTlPerTon * (w / 1000)); 
    const avgTlPerKg = avgTlPerTon / 1000; 
    items.push({
      name: 'Karma Korozyon Reçetesi (Ort: ' + fN(Math.round(tlToTarget(avgTlPerTon))) + ' ' + curSym() + '/ton)',
      section: 'Korozyon', tlKg: avgTlPerKg, qty: w, tlTotal: avgTlPerKg * w, curTotal: curTotalCost
    });
    total += curTotalCost;
  }

  if(O.boltCard&&O.scope['Screw and Nuts']==='S'){
    const mc=BOLT_CARDS.find(c=>c.id===O.boltCard);
    if(mc){const tl=cardTL(mc);const cur=tlToTarget(tl);items.push({name:'Cıvata: '+mc.name,section:'Cıvata',tlKg:tl,qty:w,tlTotal:tl*w,curTotal:cur*w});total+=cur*w}
  }
  
  if(O.scope['Site Transportation']==='S' && O.del.tCost > 0 && O.del.tCap > 0 && O.proj.tw > 0) {
    const shipmentCount = Math.ceil(O.proj.tw / O.del.tCap);
    const totalCostTL = shipmentCount * O.del.tCost;
    const curTotal = tlToTarget(totalCostTL);
    const tlTotalPerKg = totalCostTL / w; 
    items.push({
      name: `Saha Nakliyesi (${shipmentCount} Sefer x ${fN(O.del.tCost)} TL)`,
      section: 'Nakliye', tlKg: tlTotalPerKg, qty: w, tlTotal: tlTotalPerKg * w, curTotal: curTotal
    });
    total += curTotal;
  }

  const extras=[
    {scope:'Shot Blast',tl:getV3Price('satinalma','Ana Yapı-Kumlama')||1,name:'Kumlama'},
    {scope:'Anchor Bolts',tl:1.2,name:'Ankraj'},{scope:'3rd Party Tests',tl:0.3,name:'3. Parti Test'},
    {scope:'Pre-Assembly',tl:0.5,name:'Ön Montaj'},{scope:'Shop Drawings',tl:0.4,name:'Shop Drawing'},
    {scope:'Statical Design',tl:0.3,name:'Statik Hesap'},
    {scope:'Assembly Team/Equipment',tl:3.0,name:'Montaj Ekibi'},{scope:'Anchor Bolt Assembly',tl:0.5,name:'Ankraj Montaj'},
    {scope:'Concrete Works',tl:1.0,name:'Beton İşleri'}
  ];
  extras.forEach(se=>{if(O.scope[se.scope]==='S'){const cur=tlToTarget(se.tl);items.push({name:se.name,section:'Scope',tlKg:se.tl,qty:w,tlTotal:se.tl*w,curTotal:cur*w});total+=cur*w}});
  
  return{items,total,perTon:O.proj.tw>0?total/O.proj.tw:0};
}

    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="color:var(--text3)">TAX <input class="fi" type="number" value="'+O.tax+'" style="width:45px;padding:3px 6px;font-size:11px;text-align:center;display:inline" onchange="O.tax=+this.value;render()">%</span><span>'+fN(Math.round(oTx()))+'</span></div>'+
    '<div style="border-top:2px solid var(--border);padding-top:8px;display:flex;justify-content:space-between"><strong style="color:var(--orange)">GRAND TOTAL</strong><strong style="font-size:20px;color:var(--orange)">'+fN(Math.round(oTot()))+' '+O.proj.cur+'</strong></div></div>';
  return h;
}

// ═══ POZ UPDATE & APPLY (OTOMATİK TONAJ EKLENDİ) ═══
function pozUpd(id,f,v){const r=O.poz.find(p=>p.id===id);if(!r)return;r[f]=(f==='q'||f==='up')?+v||0:v;render();}
function pozAdd(){const nid=Math.max(...O.poz.map(r=>r.id),0)+1;O.poz.push({id:nid,p:'POZ-'+String(nid).padStart(3,'0'),type:'main_steel',d:'',q:0,u:'TON',up:0});render()}
function pozDel(id){if(O.poz.length>1)O.poz=O.poz.filter(r=>r.id!==id);render()}
function pozApply(id){
  const r=O.poz.find(p=>p.id===id);if(!r)return;
  const pc=pozCostPerTon();
  if(pc.costPerTon<=0){toast('Maliyet hesaplanamadı','err');return}
  r.up=Math.round(pc.costPerTon*(1+O.margin/100));
  r.d=pozTypeLabel(r.type);
  if(r.q === 0) r.q = O.proj.tw; // EĞER MİKTAR GİRİLMEMİŞSE OTOMATİK PROJE TONAJINI YAZ
  toast(r.p+': '+fN(r.up)+' '+O.proj.cur+'/ton');
  render();
}
function pozApplyAll(){
  let n=0;
  O.poz.forEach(r=>{
    const pc=pozCostPerTon();
    if(pc.costPerTon>0){
      r.up=Math.round(pc.costPerTon*(1+O.margin/100));
      r.d=pozTypeLabel(r.type);
      if(r.q === 0 && O.poz.length === 1) r.q = O.proj.tw; // TEK SATIRSA VE 0 İSE OTO TONAJ YAZ
      n++;
    }
  });
  if(!n){toast('Maliyet yok','err');return}
  toast(n+' POZ güncellendi');
  render();
}
function applyPrice(){pozApplyAll()}

// ═══ ⑪ ÖDEME ═══
function tabPay(){
  const sg=[{k:'adv',l:'Advance',c:'var(--teal)'},{k:'ld',l:'Loading',c:'var(--blue)'},{k:'fat',l:'FAT',c:'var(--orange)'},{k:'dv',l:'Delivery',c:'#8B5CF6'}];
  const tot=sg.reduce((s,g)=>s+O.pay[g.k],0);
  let inp='';sg.forEach(g=>{inp+=fd(g.l+' %','<input class="fi" type="number" min="0" max="100" value="'+O.pay[g.k]+'" onchange="payUpd(\''+g.k+'\',+this.value)">')});
  let bar='';sg.forEach(g=>{const w=tot>0?(O.pay[g.k]/tot)*100:25;bar+='<div style="width:'+w+'%;background:'+g.c+'">'+O.pay[g.k]+'%</div>'});
  let bd='';sg.forEach(g=>{bd+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:'+g.c+';font-weight:600">'+g.l+' '+O.pay[g.k]+'%</span><strong>'+fN(Math.round(oTot()*O.pay[g.k]/100))+' '+O.proj.cur+'</strong></div>'});
  return'<div class="card-title"><span class="card-num">11</span>Ödeme Koşulları</div><div class="fg4">'+inp+'</div><div class="pb">'+bar+'</div>'+(tot!==100?'<div style="margin-top:4px;font-size:11px;color:var(--red);font-weight:600">⚠ Toplam: %'+tot+' — 100% olmalı</div>':'')+'<div class="sc">'+bd+'</div>';
}
function payUpd(key,val){const temp={...O.pay};temp[key]=val;if(temp.adv+temp.ld+temp.fat+temp.dv>100){toast('%100 geçemez!','err');return}O.pay[key]=val;render()}

// ═══ ⑫ TIMELINE ═══
function tabTime(){
  const mw=Math.max(...O.gantt.map(g=>g.sw+g.dur),12);const gc=['var(--blue)','var(--teal)','var(--orange)','var(--blue)'];
  let inp='';O.gantt.forEach((g,i)=>{inp+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="width:80px;font-size:11px;color:var(--text3);font-weight:600">'+g.l+'</span> W<input class="fi" type="number" value="'+g.sw+'" style="width:45px;padding:4px;text-align:center;font-size:12px" onchange="O.gantt['+i+'].sw=+this.value;render()"> Süre<input class="fi" type="number" value="'+g.dur+'" style="width:45px;padding:4px;text-align:center;font-size:12px" onchange="O.gantt['+i+'].dur=+this.value;render()"> hafta</div>'});
  let bars='';O.gantt.forEach((g,i)=>{bars+='<div class="gr"><div class="gl">'+g.l+'</div><div class="gt"><div class="gb" style="left:'+((g.sw-1)/mw*100)+'%;width:'+(g.dur/mw*100)+'%;background:'+gc[i]+'">'+g.dur+'w</div></div></div>'});
  return'<div class="card-title"><span class="card-num">12</span>Zaman Çizelgesi</div>'+inp+'<div class="gw">'+bars+'</div>';
}

// ═══ ⑬ ŞARTLAR ═══
function tabTerm(){return'<div class="card-title"><span class="card-num">13</span>Genel Şartlar</div><textarea class="fi" style="min-height:220px" onchange="O.tt=this.value">'+O.tt+'</textarea>'}

// ═══ APPROVE ═══
function approve(){
  if(!O.cust.co){toast('Firma seçilmemiş!','err');return}
  if(!O.proj.pn){toast('Proje adı girilmemiş!','err');return}
  if(O.proj.tw<=0){toast('Tonaj girilmemiş!','err');return}
  if(!confirm('Teklif onaylanacak ve Projeler kısmına aktarılacak.\nDevam?'))return;
  const pjs=ld('djy_proje')||[];const maxM=pjs.reduce((mx,p)=>{const n=parseInt((p.kod||'').replace('M',''));return n>mx?n:mx},0);
  const newKod='M'+(maxM+1);const avgPrice=O.proj.tw>0?oNet()/O.proj.tw:0;const pb=O.proj.cur==='EUR'?'€':O.proj.cur==='USD'?'$':'TL';
  pjs.push({id:uid(),kod:newKod,musteri:O.cust.co,yil:new Date().getFullYear(),sozlesmeNo:O.proj.no,sozlesmeTarih:O.proj.dt,tonaj:Math.round(O.proj.tw*1000),birimFiyat:parseFloat(avgPrice.toFixed(2)),paraBirimi:pb,odeme1:O.pay.adv,odeme2:O.pay.ld,odeme3:O.pay.fat+O.pay.dv,notlar:'CO → '+O.proj.no+' | '+O.proj.pn});
  sv('djy_proje',pjs);
  const offers=ld('djy_co_offers')||[];offers.push({no:O.proj.no,firma:O.cust.co,proje:O.proj.pn,tonaj:O.proj.tw,total:oTot(),cur:O.proj.cur,tarih:O.proj.dt,status:'approved',projectCode:newKod});sv('djy_co_offers',offers);
  toast('Onaylandı → '+newKod);
  O.proj.no=autoNo();O.cust={co:'',cn:'',cp:'',em:'',ph:'',web:'',pb:'€'};O.proj.pn='';O.proj.tw=0;O.poz=[{id:1,p:'POZ-001',d:'',q:0,u:'TON',up:0}];
  O.matBasket=[]; O.mfgBasket=[]; O.corrBasket=[]; tab=0;render();
}
