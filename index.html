<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>DJY Sistem</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 30px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #22c55e;
      color: white;
    }

    button:hover {
      background: #16a34a;
    }

    .customer-item {
      background: #334155;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .actions button {
      margin-left: 5px;
      background: #475569;
    }

    .actions button:hover {
      background: #64748b;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🚀 DJY Yönetim Paneli</h1>

  <div class="card">
    <input id="companyInput" placeholder="Şirket adı gir">
    <button onclick="addCustomer()">Ekle</button>
  </div>

  <div class="card">
    <h2>Müşteriler</h2>
    <div id="customerList"></div>
  </div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://yqzeanpgjeeiepmwdzlt.supabase.co",
  "sb_publishable_T2jW1Iw2cuhun9qVB9UnrQ_M4-VI93X"
);

async function addCustomer() {
  const input = document.getElementById("companyInput");
  const companyName = input.value;

  if (!companyName) {
    alert("Şirket adı gir!");
    return;
  }

  const { error } = await supabaseClient
    .from("customers")
    .insert([{ company_name: companyName }]);

  if (error) {
    alert(error.message);
  } else {
    input.value = "";
    loadCustomers();
  }
}

async function loadCustomers() {
  const { data, error } = await supabaseClient
    .from("customers")
    .select("*");

  if (error) return;

  const list = document.getElementById("customerList");
  list.innerHTML = "";

  data.forEach(c => {
    const div = document.createElement("div");
    div.className = "customer-item";

    div.innerHTML = `
      <span>${c.company_name}</span>
      <div class="actions">
        <button onclick="editCustomer('${c.id}', '${c.company_name}')">✏️</button>
        <button onclick="deleteCustomer('${c.id}')">❌</button>
      </div>
    `;

    list.appendChild(div);
  });
}

async function deleteCustomer(id) {
  await supabaseClient.from("customers").delete().eq("id", id);
  loadCustomers();
}

async function editCustomer(id, oldName) {
  const newName = prompt("Yeni isim:", oldName);
  if (!newName) return;

  await supabaseClient
    .from("customers")
    .update({ company_name: newName })
    .eq("id", id);

  loadCustomers();
}

loadCustomers();
</script>

</body>
</html>
