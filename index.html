<!DOCTYPE html>
<html>
<head>
  <title>DJY SaaS</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #020617;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      color: #22c55e;
    }

    .sidebar a {
      display: block;
      color: #94a3b8;
      margin: 10px 0;
      text-decoration: none;
    }

    .sidebar a:hover {
      color: white;
    }

    .main {
      flex: 1;
      padding: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: black;
      cursor: pointer;
    }

    li {
      margin: 10px 0;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>🚀 DJY</h2>
  <a href="#">Dashboard</a>
  <a href="#">Müşteriler</a>
  <a href="#">Ayarlar</a>
</div>

<div class="main">

  <h1>Dashboard</h1>

  <div class="card">
    <h3>Müşteri Ekle</h3>
    <input id="companyInput" placeholder="Şirket adı gir">
    <button onclick="addCustomer()">Ekle</button>
  </div>

  <div class="card">
    <h3>Müşteriler</h3>
    <ul id="customerList"></ul>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://yqzeanpgjeeiepmwdzlt.supabase.co",
  "sb_publishable_T2jW1Iw2cuhun9qVB9UnrQ_M4-VI93X"
);

async function addCustomer() {
  const input = document.getElementById("companyInput");
  const companyName = input.value;

  if (!companyName) return;

  await supabaseClient.from("customers").insert([
    { company_name: companyName }
  ]);

  input.value = "";
  loadCustomers();
}

async function loadCustomers() {
  const { data } = await supabaseClient
    .from("customers")
    .select("*");

  const list = document.getElementById("customerList");
  list.innerHTML = "";

  data.forEach(c => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${c.company_name}
      <button onclick="deleteCustomer('${c.id}')">❌</button>
    `;
    list.appendChild(li);
  });
}

async function deleteCustomer(id) {
  await supabaseClient
    .from("customers")
    .delete()
    .eq("id", id);

  loadCustomers();
}

loadCustomers();
</script>

</body>
</html>
