<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DJY SaaS</title>
</head>
<body>

<h1>DJY Sistem</h1>

<input id="companyInput" placeholder="Şirket adı gir" />
<button onclick="addCustomer()">Ekle</button>

<hr>

<h2>Müşteriler</h2>
<ul id="customerList"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 🔥 SUPABASE BAĞLANTI
const supabaseClient = window.supabase.createClient(
  "https://yqzeanpgjeeiepmwdzlt.supabase.co",
  "sb_publishable_T2jW1Iw2cuhun9qVB9UnrQ_M4-VI93X"
);

// 🔥 ENTER İLE EKLE
document.getElementById("companyInput")
  .addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      addCustomer();
    }
  });

// ➕ EKLE
async function addCustomer() {
  const input = document.getElementById("companyInput");
  const companyName = input.value.trim();

  if (!companyName) {
    alert("Şirket adı gir!");
    return;
  }

  const { error } = await supabaseClient
    .from("customers")
    .insert([{ company_name: companyName }]);

  if (error) {
    alert("Hata: " + error.message);
  } else {
    input.value = "";
    loadCustomers();
  }
}

// 📋 LİSTELE
async function loadCustomers() {
  const { data, error } = await supabaseClient
    .from("customers")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    alert(error.message);
    return;
  }

  const list = document.getElementById("customerList");
  list.innerHTML = "";

  data.forEach(c => {
    const li = document.createElement("li");

    li.innerHTML = `
      ${c.company_name}
      <button onclick="deleteCustomer('${c.id}')">❌</button>
      <button onclick="editCustomer('${c.id}', \`${c.company_name}\`)">✏️</button>
    `;

    list.appendChild(li);
  });
}

// ❌ SİL
async function deleteCustomer(id) {
  const confirmDelete = confirm("Silmek istiyor musun?");
  if (!confirmDelete) return;

  const { error } = await supabaseClient
    .from("customers")
    .delete()
    .eq("id", id);

  if (error) {
    alert(error.message);
  } else {
    loadCustomers();
  }
}

// ✏️ GÜNCELLE
async function editCustomer(id, oldName) {
  const newName = prompt("Yeni isim gir:", oldName);
  if (!newName) return;

  const { error } = await supabaseClient
    .from("customers")
    .update({ company_name: newName })
    .eq("id", id);

  if (error) {
    alert(error.message);
  } else {
    loadCustomers();
  }
}

// 🚀 SAYFA AÇILINCA YÜKLE
loadCustomers();

</script>

</body>
</html>
