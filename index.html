<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DJY SaaS</title>
</head>
<body>

<h1>DJY Sistem</h1>

<input id="companyInput" placeholder="Şirket adı gir">
<button id="addBtn">Ekle</button>

<hr>

<h2>Müşteriler</h2>
<ul id="customerList"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://yqzeanpgjeeiepmwdzlt.supabase.co",
  "sb_publishable_T2jW1Iw2cuhun9qVB9UnrQ_M4-VI93X"
);

// BUTON EVENT (onclick KALDIRDIK)
document.getElementById("addBtn").addEventListener("click", addCustomer);

async function addCustomer() {
  const input = document.getElementById("companyInput");
  const name = input.value.trim();

  if (!name) {
    alert("Boş olamaz");
    return;
  }

  const { error } = await client
    .from("customers")
    .insert([{ company_name: name }]);

  if (error) {
    alert(error.message);
  } else {
    input.value = "";
    loadCustomers();
  }
}

async function loadCustomers() {
  const { data, error } = await client
    .from("customers")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  const list = document.getElementById("customerList");
  list.innerHTML = "";

  data.forEach(c => {
    const li = document.createElement("li");

    const delBtn = document.createElement("button");
    delBtn.textContent = "❌";
    delBtn.onclick = () => deleteCustomer(c.id);

    const editBtn = document.createElement("button");
    editBtn.textContent = "✏️";
    editBtn.onclick = () => editCustomer(c.id, c.company_name);

    li.textContent = c.company_name + " ";
    li.appendChild(editBtn);
    li.appendChild(delBtn);

    list.appendChild(li);
  });
}

async function deleteCustomer(id) {
  const { error } = await client
    .from("customers")
    .delete()
    .eq("id", id);

  if (!error) loadCustomers();
}

async function editCustomer(id, oldName) {
  const newName = prompt("Yeni isim:", oldName);
  if (!newName) return;

  const { error } = await client
    .from("customers")
    .update({ company_name: newName })
    .eq("id", id);

  if (!error) loadCustomers();
}

loadCustomers();
</script>

</body>
</html>
