<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>DJY SaaS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e1e2f, #2b2b45);
      color: white;
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .card {
      background: #2f2f4f;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 70%;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.8;
    }

    .customer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #3a3a5c;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .actions button {
      margin-left: 5px;
      background: #ff5252;
    }

    .edit {
      background: #ffc107 !important;
      color: black;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🚀 DJY Sistem</h1>

  <div class="card">
    <input id="companyInput" placeholder="Şirket adı gir">
    <button onclick="addCustomer()">Ekle</button>
  </div>

  <div class="card">
    <h2>Müşteriler</h2>
    <div id="customerList"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://yqzeanpgjeeiepmwdzlt.supabase.co",
  "sb_publishable_T2jW1Iw2cuhun9qVB9UnrQ_M4-VI93X"
);

// EKLE
async function addCustomer() {
  const input = document.getElementById("companyInput");
  const name = input.value;

  if (!name) return alert("Şirket adı gir!");

  const { error } = await supabaseClient
    .from("customers")
    .insert([{ company_name: name }]);

  if (error) {
    alert(error.message);
  } else {
    input.value = "";
    loadCustomers();
  }
}

// LİSTE
async function loadCustomers() {
  const { data } = await supabaseClient
    .from("customers")
    .select("*");

  const list = document.getElementById("customerList");
  list.innerHTML = "";

  data.forEach(c => {
    const div = document.createElement("div");
    div.className = "customer";

    div.innerHTML = `
      <span>${c.company_name}</span>
      <div class="actions">
        <button class="edit" onclick="editCustomer('${c.id}', '${c.company_name}')">✏️</button>
        <button onclick="deleteCustomer('${c.id}')">❌</button>
      </div>
    `;

    list.appendChild(div);
  });
}

// SİL
async function deleteCustomer(id) {
  if (!confirm("Silinsin mi?")) return;

  await supabaseClient
    .from("customers")
    .delete()
    .eq("id", id);

  loadCustomers();
}

// GÜNCELLE
async function editCustomer(id, oldName) {
  const newName = prompt("Yeni isim:", oldName);
  if (!newName) return;

  await supabaseClient
    .from("customers")
    .update({ company_name: newName })
    .eq("id", id);

  loadCustomers();
}

loadCustomers();
</script>

</body>
</html>
