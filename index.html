<!DOCTYPE html>
<html>
<head>
  <title>DJY SaaS</title>
</head>
<body>

<h1>DJY Sistem</h1>

<input id="companyInput" placeholder="Şirket adı gir" />
<button onclick="addCustomer()">Müşteri Ekle</button>

<hr>

<h2>Müşteriler</h2>
<ul id="customerList"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://yqzeanpgjeeiepmwdzlt.supabase.co",
  "sb_publishable_T2jW1Iw2cuhun9qVB9UnrQ_M4-VI93X"
);

async function addCustomer() {
  const companyName = document.getElementById("companyInput").value;

  if (!companyName) {
    alert("Şirket adı gir!");
    return;
  }

  const { error } = await supabaseClient
    .from("customers")
    .insert([{ company_name: companyName }]);

  if (error) {
    alert("Hata: " + error.message);
  } else {
    alert("Eklendi!");
    loadCustomers();
  }
}

async function loadCustomers() {
  const { data, error } = await supabaseClient
    .from("customers")
    .select("*");

  if (error) return;

  const list = document.getElementById("customerList");
  list.innerHTML = "";

  data.forEach(c => {
    const li = document.createElement("li");
    li.textContent = c.company_name;
    list.appendChild(li);
  });
}

loadCustomers();
</script>

</body>
</html>
