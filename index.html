<script>
const supabase = window.supabase.createClient(
  "https://yqzeanpgjeeiepmwdzlt.supabase.co",
  "sb_publishable_T2jW1Iw2cuhun9qVB9UnrQ_M4-VI93X"
);

let user = null;

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert("Giriş hatası: " + error.message);
    return;
  }

  user = data.user;
  showApp();
}

// REGISTER 🔥 FIXED
async function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      emailRedirectTo: window.location.origin
    }
  });

  if (error) {
    alert("Kayıt hatası: " + error.message);
    return;
  }

  alert("Kayıt başarılı! (Eğer mail gelmezse Users panelinden giriş aç)");
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// APP
function showApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadCustomers();
}

// EKLE
async function addCustomer() {
  if (!user) {
    alert("Önce giriş yap");
    return;
  }

  const name = document.getElementById("companyInput").value;

  if (!name) {
    alert("Şirket adı gir");
    return;
  }

  const { error } = await supabase.from("customers").insert([
    {
      company_name: name,
      user_id: user.id
    }
  ]);

  if (error) {
    alert("HATA: " + error.message);
    return;
  }

  document.getElementById("companyInput").value = "";
  loadCustomers();
}

// LİSTE
async function loadCustomers() {
  const { data, error } = await supabase
    .from("customers")
    .select("*")
    .eq("user_id", user.id);

  if (error) {
    alert(error.message);
    return;
  }

  const list = document.getElementById("customerList");
  list.innerHTML = "";

  data.forEach(c => {
    const li = document.createElement("li");
    li.textContent = c.company_name;
    list.appendChild(li);
  });
}

// SESSION
supabase.auth.getSession().then(({ data }) => {
  if (data.session) {
    user = data.session.user;
    showApp();
  }
});
</script>
